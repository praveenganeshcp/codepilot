@for (table of tables(); track table.id) {
  <table>
    <tr>
      @for (h of table.headers; track h) {
        <th>{{ h }}</th>
      }
    </tr>
    @for (row of table.rows; track row) {
      <tr>
        @for (cell of row; track cell) {
          <td>{{ cell }}</td>
        }
      </tr>
    }
  </table>
}
